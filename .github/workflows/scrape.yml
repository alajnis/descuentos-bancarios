name: Scrape Descuentos Bancarios

on:
  schedule:
    # Corre todos los días a las 3am UTC (0am Argentina es UTC-3, así que 3am Argentina = 6am UTC)
    - cron: '0 6 * * *'  # 6am UTC = 3am Argentina
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        run: python scraper.py
      
      - name: Commit and push changes
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: actualizar descuentos $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
