name: Actualizar Descuentos Diarios (APIs BBVA + Santander)

on:
  schedule:
    # 3am Argentina time (6am UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Ejecutar scraper
        run: python scraper.py
      
      - name: Verificar cambios
        id: verify
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit y push
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config --global user.email "github-actions@example.com"
          git config --global user.name "GitHub Actions"
          git add data.json
          git commit -m "Auto: actualizar descuentos $(date +'%Y-%m-%d %H:%M:%S')"
          git push
      
      - name: Sin cambios
        if: steps.verify.outputs.changed == 'false'
        run: |
          echo "✓ data.json sin cambios"
